name: Build Test SonarQube Snyk Nexus Deploy

on:
  push:
    branches:
      - main

jobs:
  build-sonar-snyk-nexus-deploy:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ✅ Cache Maven
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      # ✅ Configure Maven for Nexus
      - name: Configure Maven for Nexus
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      # ✅ Build Steps
      - name: Validate
        run: mvn validate

      - name: Compile
        run: mvn compile

      - name: Test
        run: mvn test

      # ✅ SonarQube Scan
      - name: SonarQube Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=train-ticket-reservation \
            -Dsonar.host.url=${{ secrets.SONARQUBE_HOST }} \
            -Dsonar.login=${{ secrets.SONARQUBE_TOKEN }}

      # ✅ Setup Node for Snyk
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Install Snyk
      - name: Install Snyk
        run: npm install -g snyk

      # ✅ Authenticate Snyk
      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # ✅ Run Snyk Scan
      - name: Run Snyk Test
        run: snyk test || true

      # ✅ Package WAR
      - name: Package
        run: mvn clean package -DskipTests

      # ✅ Upload to Nexus
      - name: Upload WAR to Nexus
        run: mvn deploy -DskipTests

      # ✅ Deploy from Nexus to Tomcat
      - name: Deploy in Tomcat (from Nexus)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /home/ubuntu/apache-tomcat-9.0.98

            cd /home/ubuntu

            # Download WAR from Nexus (UPDATE PATH if needed)
            wget http://13.127.61.77:8081/repository/maven-releases/com/example/train-ticket-reservation/1.0-SNAPSHOT/train-ticket-reservation-1.0-SNAPSHOT.war

            cd /home/ubuntu/apache-tomcat-9.0.98/bin
            ./shutdown.sh || true
            sleep 10

            rm -rf /home/ubuntu/apache-tomcat-9.0.98/webapps/*

            cp /home/ubuntu/train-ticket-reservation-1.0-SNAPSHOT.war /home/ubuntu/apache-tomcat-9.0.98/webapps/ROOT.war

            ./startup.sh
